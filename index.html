<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Laundry Club — Dashboards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');

  :root {
    --bg:         #1C1F26;
    --bg2:        #23272F;
    --bg3:        #2A2F3A;
    --teal:       #0A9278;
    --teal-bright:#1EE1DB;
    --teal-mid:   #57B3A8;
    --teal-light: #D8EEED;
    --white:      #FFFFFF;
    --gray:       #9DA8B4;
    --border:     #353B47;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* background grid texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(10,146,120,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,146,120,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px;
    height: 56px;
    border: 2px solid var(--teal);
    border-radius: 12px;
    margin-bottom: 20px;
    background: rgba(10,146,120,0.1);
    box-shadow: 0 0 24px rgba(30,225,219,0.15);
  }

  .logo-mark svg {
    width: 28px;
    height: 28px;
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: var(--white);
    margin-bottom: 6px;
  }

  .brand span {
    color: var(--teal-bright);
  }

  .tagline {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--teal-mid);
  }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--teal), transparent);
    margin-bottom: 36px;
    opacity: 0.5;
  }

  /* SECTION LABEL */
  .section-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--teal-mid);
    margin-bottom: 14px;
    padding-left: 2px;
  }

  /* CARDS */
  .card-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 36px;
  }

  .card {
    display: flex;
    align-items: center;
    gap: 18px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    text-decoration: none;
    color: var(--white);
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--teal), var(--teal-bright));
    border-radius: 3px 0 0 3px;
  }

  .card:hover {
    border-color: var(--teal);
    box-shadow: 0 0 20px rgba(30,225,219,0.08);
    transform: translateX(3px);
  }

  .card-icon {
    font-size: 22px;
    flex-shrink: 0;
    width: 40px;
    text-align: center;
  }

  .card-body {
    flex: 1;
  }

  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 3px;
  }

  .card-sub {
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 0.5px;
  }

  .card-arrow {
    color: var(--teal-mid);
    font-size: 16px;
    flex-shrink: 0;
    transition: color 0.2s;
  }

  .card:hover .card-arrow {
    color: var(--teal-bright);
  }

  /* FOOTER */
  .footer {
    text-align: center;
    font-size: 10px;
    color: var(--border);
    letter-spacing: 1px;
  }

  .footer span {
    color: var(--teal-mid);
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="14" r="11" stroke="#1EE1DB" stroke-width="2"/>
        <circle cx="14" cy="14" r="6" stroke="#0A9278" stroke-width="1.5"/>
        <circle cx="14" cy="14" r="2" fill="#1EE1DB"/>
      </svg>
    </div>
    <div class="brand">Star Laundry <span>Club</span></div>
    <div class="tagline">Operations Dashboards</div>
  </div>

  <div class="divider"></div>

  <div class="section-label">— Locations</div>

  <div class="card-list">
    <a class="card" href="https://StarLaundryClub.github.io/slc-dashboard/index.html" target="_blank">
      <div class="card-icon">🏙️</div>
      <div class="card-body">
        <div class="card-title">Brighton — Boston, MA</div>
        <div class="card-sub">KPI Operational Dashboard</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card" href="https://StarLaundryClub.github.io/slc-dashboard/SLC_Nashua_Dashboard.html" target="_blank">
      <div class="card-icon">🏔️</div>
      <div class="card-body">
        <div class="card-title">Nashua, NH</div>
        <div class="card-sub">KPI Operational Dashboard</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card" href="https://StarLaundryClub.github.io/slc-dashboard/SLC_Orem_KPI_Dashboard.html" target="_blank">
      <div class="card-icon">⛰️</div>
      <div class="card-body">
        <div class="card-title">Orem, UT</div>
        <div class="card-sub">KPI Operational Dashboard</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card" href="https://StarLaundryClub.github.io/slc-dashboard/slc-orem-dashboard-eval-review.html" target="_blank">
      <div class="card-icon">📋</div>
      <div class="card-body">
        <div class="card-title">Orem, UT — Evaluation Review</div>
        <div class="card-sub">Extended Evaluation Dashboard</div>
      </div>
      <div class="card-arrow">→</div>
    </a>
  </div>

  <div class="footer">
    <span>Star Laundry Club</span> · Boston Home Service Company
  </div>

</div>

</body>
</html>
